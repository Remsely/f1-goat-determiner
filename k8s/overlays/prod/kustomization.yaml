apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../base

patches:
  - path: ingress-patch.yaml

replicas:
  - name: analytics-api
    count: 2

images:
  - name: remsely/f1-goat-determiner-analytics-api
    newTag: latest
  - name: remsely/f1-goat-determiner-web
    newTag: latest
  - name: remsely/f1-goat-determiner-data-sync-svc
    newTag: latest
