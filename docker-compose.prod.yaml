services:
  postgres:
    image: postgres:18.2-alpine
    container_name: f1-goat-determiner-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-f1_goat_determiner}
      POSTGRES_USER: ${POSTGRES_USER:-f1user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-f1user} -d ${POSTGRES_DB:-f1_goat_determiner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - f1-network

  analytics-api:
    image: ${DOCKERHUB_USERNAME:-remsely}/f1-goat-determiner-analytics-api:latest
    container_name: f1-goat-determiner-analytics-api
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-f1_goat_determiner}
      - DB_USER=${POSTGRES_USER:-f1user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - f1-network

  web:
    image: ${DOCKERHUB_USERNAME:-remsely}/f1-goat-determiner-web:latest
    container_name: f1-goat-determiner-web
    ports:
      - "80:80"
    depends_on:
      - analytics-api
    restart: unless-stopped
    networks:
      - f1-network

  data-sync-svc:
    image: ${DOCKERHUB_USERNAME:-remsely}/f1-goat-determiner-data-sync-svc:latest
    container_name: f1-goat-determiner-data-sync-svc
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-f1_goat_determiner}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-f1user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - f1-network

volumes:
  postgres_data:

networks:
  f1-network:
    name: f1-goat-network
