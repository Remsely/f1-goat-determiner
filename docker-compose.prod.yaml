services:
  postgres:
    image: postgres:18.2-alpine
    container_name: f1-goat-determiner-postgres
    environment:
      POSTGRES_DB: f1_goat_determiner
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1_goat_determiner"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - f1-network

  analytics-api:
    image: ${DOCKERHUB_USERNAME:-remsely}/f1-goat-analytics-api:latest
    container_name: f1-goat-analytics-api
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=f1_goat_determiner
      - DB_USER=f1user
      - DB_PASSWORD=f1password
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - f1-network

  frontend:
    image: ${DOCKERHUB_USERNAME:-remsely}/f1-goat-frontend:latest
    container_name: f1-goat-frontend
    volumes:
      - frontend-static:/static
    networks:
      - f1-network

  nginx:
    image: ${DOCKERHUB_USERNAME:-remsely}/f1-goat-nginx:latest
    container_name: f1-goat-nginx
    ports:
      - "80:80"
    volumes:
      - frontend-static:/usr/share/nginx/html:ro
    depends_on:
      - analytics-api
      - frontend
    restart: unless-stopped
    networks:
      - f1-network

volumes:
  postgres_data:
  frontend-static:

networks:
  f1-network:
    name: f1-goat-network
