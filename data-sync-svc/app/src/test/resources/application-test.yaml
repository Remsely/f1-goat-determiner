spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    root: WARN
    org.testcontainers: INFO

integration:
  jolpica:
    base-url: http://localhost:9999
    connect-timeout: 5s
    read-timeout: 5s
    page-size: 100
    rate-limit: 4
    retry-max-attempts: 1
    retry-wait-duration: 100ms
