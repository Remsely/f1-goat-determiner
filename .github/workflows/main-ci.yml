name: Main CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      analytics-api: ${{ steps.filter.outputs.analytics-api }}
      data-sync-svc: ${{ steps.filter.outputs.data-sync-svc }}
      frontend: ${{ steps.filter.outputs.frontend }}
      nginx: ${{ steps.filter.outputs.nginx }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            analytics-api:
              - 'analytics-api/src/**'
              - 'analytics-api/tests/**'
              - 'analytics-api/pyproject.toml'
              - 'analytics-api/ruff.toml'
              - 'analytics-api/Dockerfile'
              - '.github/workflows/lint-python.yml'
              - '.github/workflows/test-python.yml'
              - '.github/workflows/main-ci.yml'
            frontend:
              - 'frontend/src/**'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/vite.config.ts'
              - 'frontend/tsconfig*.json'
              - 'frontend/eslint.config.js'
              - 'frontend/.prettierrc.json'
              - '.github/workflows/lint-typescript.yml'
              - '.github/workflows/test-typescript.yml'
              - '.github/workflows/build-typescript.yml'
              - '.github/workflows/main-ci.yml'
            data-sync-svc:
              - 'data-sync-svc/app/**'
              - 'data-sync-svc/build-logic/**'
              - 'data-sync-svc/config/**'
              - 'data-sync-svc/db/**'
              - 'data-sync-svc/domain/**'
              - 'data-sync-svc/gradle/**'
              - 'data-sync-svc/jolpica/**'
              - 'data-sync-svc/scheduled/**'
              - 'data-sync-svc/use-case/**'
              - 'data-sync-svc/build.gradle.kts'
              - 'data-sync-svc/settings.gradle.kts'
              - 'data-sync-svc/gradlew'
              - 'data-sync-svc/gradlew.bat'
              - 'data-sync-svc/Dockerfile'
              - '.github/workflows/verify-kotlin.yml'
              - '.github/workflows/main-ci.yml'
            nginx:
              - 'nginx/**'
              - '.dockerignore'
              - '.github/workflows/lint-nginx.yml'
              - '.github/workflows/main-ci.yml'
            k8s:
              - 'k8s/**'
              - '.github/workflows/reusable-deploy.yml'
              - '.github/workflows/deploy-test.yml'
              - '.github/workflows/main-ci.yml'

  # === ANALYTICS API ===
  analytics-api-lint:
    name: Analytics API - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.analytics-api == 'true'
    uses: ./.github/workflows/lint-python.yml
    with:
      working-directory: './analytics-api'

  analytics-api-test:
    name: Analytics API - Test
    needs: analytics-api-lint
    uses: ./.github/workflows/test-python.yml
    with:
      working-directory: './analytics-api'

  analytics-api-build:
    name: Analytics API - Build & Push
    needs: analytics-api-test
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image-name: f1-goat-determiner-analytics-api
      context: ./analytics-api
      dockerfile: ./analytics-api/Dockerfile
      tag-suffix: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # === WEB (frontend + nginx) ===
  frontend-lint:
    name: Frontend - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/lint-typescript.yml
    with:
      working-directory: './frontend'

  frontend-test:
    name: Frontend - Test
    needs: frontend-lint
    uses: ./.github/workflows/test-typescript.yml
    with:
      working-directory: './frontend'

  frontend-build-check:
    name: Frontend - Build
    needs: frontend-test
    uses: ./.github/workflows/build-typescript.yml
    with:
      working-directory: './frontend'

  nginx-lint:
    name: Nginx - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx == 'true'
    uses: ./.github/workflows/lint-nginx.yml
    with:
      working-directory: './nginx'

  web-build:
    name: Web - Build & Push
    needs: [ frontend-build-check, nginx-lint ]
    if: |
      always() &&
      (needs.frontend-build-check.result == 'success' || needs.nginx-lint.result == 'success') &&
      needs.frontend-build-check.result != 'failure' &&
      needs.nginx-lint.result != 'failure'
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image-name: f1-goat-determiner-web
      context: ./
      dockerfile: ./nginx/Dockerfile
      tag-suffix: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # === DATA SYNC SVC ===
  data-sync-verify:
    name: Data Sync - Verify
    needs: detect-changes
    if: needs.detect-changes.outputs.data-sync-svc == 'true'
    uses: ./.github/workflows/verify-kotlin.yml
    with:
      working-directory: './data-sync-svc'

  data-sync-build:
    name: Data Sync - Build & Push
    needs: data-sync-verify
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image-name: f1-goat-determiner-data-sync-svc
      context: ./data-sync-svc
      dockerfile: ./data-sync-svc/Dockerfile
      tag-suffix: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # === DEPLOY ===
  deploy-test:
    name: Deploy to Test
    needs: [ detect-changes, analytics-api-build, web-build, data-sync-build ]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (
        needs.analytics-api-build.result == 'success' ||
        needs.web-build.result == 'success' ||
        needs.data-sync-build.result == 'success' ||
        needs.detect-changes.outputs.k8s == 'true'
      )
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      overlay: test
      namespace: test
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  deploy-prod:
    name: Deploy to Production
    needs: [ deploy-test ]
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      overlay: prod
      namespace: prod
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
