name: Main CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      analytics-api: ${{ steps.filter.outputs.analytics-api }}
      web: ${{ steps.filter.outputs.web }}
      data-sync-svc: ${{ steps.filter.outputs.data-sync-svc }}
      frontend: ${{ steps.filter.outputs.frontend }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            analytics-api:
              - 'analytics-api/src/**'
              - 'analytics-api/tests/**'
              - 'analytics-api/pyproject.toml'
              - 'analytics-api/ruff.toml'
              - 'analytics-api/Dockerfile'
              - '.github/workflows/lint-python.yml'
              - '.github/workflows/test-python.yml'
              - '.github/workflows/main-ci.yml'
            web:
              - 'frontend/src/**'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/vite.config.ts'
              - 'frontend/tsconfig*.json'
              - 'frontend/Dockerfile'
              - 'nginx/**'
              - '.dockerignore'
              - '.github/workflows/main-ci.yml'
            frontend:
              - 'frontend/src/**'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/vite.config.ts'
              - 'frontend/tsconfig*.json'
              - 'frontend/eslint.config.js'
              - 'frontend/.prettierrc.json'
              - '.github/workflows/lint-typescript.yml'
              - '.github/workflows/test-typescript.yml'
              - '.github/workflows/build-typescript.yml'
              - '.github/workflows/main-ci.yml'
            data-sync-svc:
              - 'data-sync-svc/app/**'
              - 'data-sync-svc/build-logic/**'
              - 'data-sync-svc/config/**'
              - 'data-sync-svc/db/**'
              - 'data-sync-svc/domain/**'
              - 'data-sync-svc/gradle/**'
              - 'data-sync-svc/jolpica/**'
              - 'data-sync-svc/scheduled/**'
              - 'data-sync-svc/use-case/**'
              - 'data-sync-svc/build.gradle.kts'
              - 'data-sync-svc/settings.gradle.kts'
              - 'data-sync-svc/gradlew'
              - 'data-sync-svc/gradlew.bat'
              - 'data-sync-svc/Dockerfile'
              - '.github/workflows/verify-kotlin.yml'
              - '.github/workflows/main-ci.yml'
            nginx:
              - 'nginx/**'
              - '.github/workflows/lint-nginx.yml'
              - '.github/workflows/main-ci.yml'

  # === ANALYTICS API ===
  analytics-api-lint:
    name: Analytics API - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.analytics-api == 'true'
    uses: ./.github/workflows/lint-python.yml
    with:
      working-directory: './analytics-api'

  analytics-api-test:
    name: Analytics API - Test
    needs: analytics-api-lint
    uses: ./.github/workflows/test-python.yml
    with:
      working-directory: './analytics-api'

  analytics-api-build:
    name: Analytics API - Build & Push
    needs: analytics-api-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./analytics-api
          file: ./analytics-api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/f1-goat-determiner-analytics-api:latest
            ${{ env.DOCKERHUB_USERNAME }}/f1-goat-determiner-analytics-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # === WEB (frontend + nginx) ===
  frontend-lint:
    name: Frontend - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/lint-typescript.yml
    with:
      working-directory: './frontend'

  frontend-test:
    name: Frontend - Test
    needs: frontend-lint
    uses: ./.github/workflows/test-typescript.yml
    with:
      working-directory: './frontend'

  frontend-build-check:
    name: Frontend - Build
    needs: frontend-test
    uses: ./.github/workflows/build-typescript.yml
    with:
      working-directory: './frontend'

  nginx-lint:
    name: Nginx - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx == 'true'
    uses: ./.github/workflows/lint-nginx.yml
    with:
      working-directory: './nginx'

  web-build:
    name: Web - Build & Push
    needs: [ detect-changes, frontend-build-check, nginx-lint ]
    if: |
      always() &&
      (needs.frontend-build-check.result == 'success' || needs.frontend-build-check.result == 'skipped') &&
      (needs.nginx-lint.result == 'success' || needs.nginx-lint.result == 'skipped') &&
      needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/f1-goat-determiner-web:latest
            ${{ env.DOCKERHUB_USERNAME }}/f1-goat-determiner-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # === DATA SYNC SVC ===
  data-sync-verify:
    name: Data Sync - Verify
    needs: detect-changes
    if: needs.detect-changes.outputs.data-sync-svc == 'true'
    uses: ./.github/workflows/verify-kotlin.yml
    with:
      working-directory: './data-sync-svc'

  data-sync-build:
    name: Data Sync - Build & Push
    needs: data-sync-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./data-sync-svc
          file: ./data-sync-svc/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/f1-goat-determiner-data-sync-svc:latest
            ${{ env.DOCKERHUB_USERNAME }}/f1-goat-determiner-data-sync-svc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
