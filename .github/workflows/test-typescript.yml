name: Test TypeScript

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  test:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: bun install

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: bun run test:run
