name: Deploy to Test (PR)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  build-analytics-api:
    name: Build analytics-api-test
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image-name: f1-goat-determiner-analytics-api-test
      context: ./analytics-api
      dockerfile: ./analytics-api/Dockerfile
      tag-suffix: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  build-web:
    name: Build web-test
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image-name: f1-goat-determiner-web-test
      context: ./
      dockerfile: ./nginx/Dockerfile
      tag-suffix: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  build-data-sync-svc:
    name: Build data-sync-svc-test
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image-name: f1-goat-determiner-data-sync-svc-test
      context: ./data-sync-svc
      dockerfile: ./data-sync-svc/Dockerfile
      tag-suffix: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    name: Deploy to Test
    needs: [ build-analytics-api, build-web, build-data-sync-svc ]
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      overlay: test
      namespace: test
      apply-manifests: true
      image-tag: ${{ github.sha }}
      analytics-api-image: f1-goat-determiner-analytics-api-test
      web-image: f1-goat-determiner-web-test
      data-sync-svc-image: f1-goat-determiner-data-sync-svc-test
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
