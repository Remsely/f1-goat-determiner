name: Pull Request Checks

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      analytics-api: ${{ steps.filter.outputs.analytics-api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      data-sync-svc: ${{ steps.filter.outputs.data-sync-svc }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            analytics-api:
              - 'analytics-api/src/**'
              - 'analytics-api/tests/**'
              - 'analytics-api/pyproject.toml'
              - 'analytics-api/ruff.toml'
              - '.github/workflows/lint-python.yml'
              - '.github/workflows/test-python.yml'
              - '.github/workflows/pr-check.yml'
            frontend:
              - 'frontend/src/**'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/vite.config.ts'
              - 'frontend/tsconfig*.json'
              - 'frontend/eslint.config.js'
              - 'frontend/.prettierrc.json'
              - '.github/workflows/lint-typescript.yml'
              - '.github/workflows/test-typescript.yml'
              - '.github/workflows/build-typescript.yml'
              - '.github/workflows/pr-check.yml'
            data-sync-svc:
              - 'data-sync-svc/app/**'
              - 'data-sync-svc/build-logic/**'
              - 'data-sync-svc/config/**'
              - 'data-sync-svc/db/**'
              - 'data-sync-svc/domain/**'
              - 'data-sync-svc/gradle/**'
              - 'data-sync-svc/jolpica/**'
              - 'data-sync-svc/scheduled/**'
              - 'data-sync-svc/use-case/**'
              - 'data-sync-svc/build.gradle.kts'
              - 'data-sync-svc/settings.gradle.kts'
              - 'data-sync-svc/gradlew'
              - 'data-sync-svc/gradlew.bat'
              - 'data-sync-svc/Dockerfile'
              - '.github/workflows/verify-kotlin.yml'
              - '.github/workflows/pr-check.yml'
            nginx:
              - 'nginx/**'
              - '.github/workflows/lint-nginx.yml'
              - '.github/workflows/pr-check.yml'

  analytics-api-lint:
    name: Analytics API - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.analytics-api == 'true'
    uses: ./.github/workflows/lint-python.yml
    with:
      working-directory: './analytics-api'

  analytics-api-test:
    name: Analytics API - Test
    needs: analytics-api-lint
    uses: ./.github/workflows/test-python.yml
    with:
      working-directory: './analytics-api'

  frontend-lint:
    name: Frontend - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/lint-typescript.yml
    with:
      working-directory: './frontend'

  frontend-test:
    name: Frontend - Test
    needs: frontend-lint
    uses: ./.github/workflows/test-typescript.yml
    with:
      working-directory: './frontend'

  frontend-build:
    name: Frontend - Build
    needs: frontend-test
    uses: ./.github/workflows/build-typescript.yml
    with:
      working-directory: './frontend'

  data-sync-verify:
    name: Data Sync - Verify
    needs: detect-changes
    if: needs.detect-changes.outputs.data-sync-svc == 'true'
    uses: ./.github/workflows/verify-kotlin.yml
    with:
      working-directory: './data-sync-svc'

  nginx-lint:
    name: Nginx - Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx == 'true'
    uses: ./.github/workflows/lint-nginx.yml
    with:
      working-directory: './nginx'

  pr-check-status:
    name: PR Status Summary
    runs-on: ubuntu-latest
    needs: [ detect-changes, analytics-api-lint, analytics-api-test, frontend-lint, frontend-test, frontend-build, data-sync-verify, nginx-lint ]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Analytics API Lint: ${{ needs.analytics-api-lint.result }}"
          echo "Analytics API Test: ${{ needs.analytics-api-test.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Frontend Test: ${{ needs.frontend-test.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Data Sync: ${{ needs.data-sync-verify.result }}"
          echo "Nginx: ${{ needs.nginx-lint.result }}"

          if [ "${{ needs.analytics-api-lint.result }}" == "failure" ] || \
             [ "${{ needs.analytics-api-lint.result }}" == "cancelled" ] || \
             [ "${{ needs.analytics-api-test.result }}" == "failure" ] || \
             [ "${{ needs.analytics-api-test.result }}" == "cancelled" ] || \
             [ "${{ needs.frontend-lint.result }}" == "failure" ] || \
             [ "${{ needs.frontend-lint.result }}" == "cancelled" ] || \
             [ "${{ needs.frontend-test.result }}" == "failure" ] || \
             [ "${{ needs.frontend-test.result }}" == "cancelled" ] || \
             [ "${{ needs.frontend-build.result }}" == "failure" ] || \
             [ "${{ needs.frontend-build.result }}" == "cancelled" ] || \
             [ "${{ needs.data-sync-verify.result }}" == "failure" ] || \
             [ "${{ needs.data-sync-verify.result }}" == "cancelled" ] || \
             [ "${{ needs.nginx-lint.result }}" == "failure" ] || \
             [ "${{ needs.nginx-lint.result }}" == "cancelled" ]; then
            echo "❌ Some checks failed"
            exit 1
          fi

          echo "✅ All checks passed"
